<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin 後台管理</title>
  <style>
    :root{
      --bg:#f4f8fc;
      --panel:#ffffff;
      --line:#d8e5f2;
      --text:#1f3042;
      --muted:#63788f;
      --blue:#4a90e2;
      --purple:#8e6dd8;
      --orange:#f5a623;
      --green:#2ea97d;
      --gold:#d9a441;
      --red:#d95c68;
      --shadow:0 10px 24px rgba(58,100,160,.08);
      --r:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(124,183,255,.18), transparent 26%),
        linear-gradient(180deg,#f8fbff 0%,#eef5fc 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }
    a{text-decoration:none;color:inherit}
    button,input,textarea,select{font-family:inherit}
    .page{max-width:1480px;margin:0 auto;padding:18px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:24px;
      padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px
    }
    .brand{display:flex;flex-direction:column;gap:4px}
    .brand-kicker{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--blue);text-transform:uppercase}
    .brand-title{font-size:30px;font-weight:900}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      appearance:none;border:1px solid #bfd4ee;background:#fff;color:var(--text);
      border-radius:14px;padding:11px 16px;min-height:44px;font-size:14px;font-weight:800;
      cursor:pointer;display:inline-flex;align-items:center;justify-content:center
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(180deg,#7bbcff,#4a90e2);color:#fff;border-color:#5ca2ef}
    .btn-red{background:#fff3f4;color:#bb4252;border-color:#f0ccd2}
    .btn-green{background:#eefaf5;color:#257a57;border-color:#caecd9}
    .btn-gold{background:#fff8eb;color:#9d6a12;border-color:#ecdab7}

    .layout{
      display:grid;
      grid-template-columns:460px 1fr;
      gap:18px;
    }
    .stack{display:grid;gap:18px}
    .panel{
      background:rgba(255,255,255,.95);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel.blue .panel-head{background:linear-gradient(180deg,#f5faff,#eef6ff)}
    .panel.gold .panel-head{background:linear-gradient(180deg,#fffdf7,#fff7eb)}
    .panel.purple .panel-head{background:linear-gradient(180deg,#faf8ff,#f3efff)}
    .panel.green .panel-head{background:linear-gradient(180deg,#f4fff9,#eefaf5)}
    .panel-head{
      padding:16px 18px;border-bottom:1px solid #e9f1f8;
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap
    }
    .panel-title{font-size:21px;font-weight:900}
    .panel-sub{font-size:12px;font-weight:800;color:var(--muted);margin-top:4px}
    .panel-body{padding:16px 18px}
    .form-grid{display:grid;gap:12px}
    .field{display:grid;gap:7px}
    .field label{font-size:12px;font-weight:900;letter-spacing:1px;color:#5d82aa}
    .field input,.field textarea,.field select{
      width:100%;border:1px solid #d9e5f2;border-radius:14px;background:#fff;
      padding:12px 13px;font-size:15px;outline:none;color:var(--text)
    }
    .field textarea{min-height:110px;resize:vertical}
    .field input[type="color"]{height:48px;padding:5px}
    .hint{font-size:12px;color:var(--muted);font-weight:700;line-height:1.6}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .action-row{display:flex;gap:10px;flex-wrap:wrap}
    .status{
      margin-top:12px;padding:12px 14px;border-radius:14px;font-size:13px;font-weight:800;line-height:1.7
    }
    .status.ok{background:#eefaf5;border:1px solid #caecd9;color:#267c58}
    .status.warn{background:#fff8eb;border:1px solid #ecdab7;color:#9d6a12}
    .status.err{background:#fff3f4;border:1px solid #f0ccd2;color:#bb4252}
    .status.load{background:#f4f9ff;border:1px solid #dbe8f6;color:#507394}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .search{flex:1 1 240px}
    .search input{
      width:100%;padding:12px 14px;border:1px solid #d9e5f2;border-radius:14px;background:#fff
    }
    .count{
      min-height:38px;padding:0 12px;border-radius:999px;background:#eef6ff;color:#4a90e2;
      font-size:12px;font-weight:900;display:inline-flex;align-items:center
    }

    .list{display:grid;gap:12px}
    .item{
      border:1px solid #dfeaf5;border-radius:18px;background:linear-gradient(180deg,#fff,#f9fbff);
      padding:14px;display:grid;gap:10px
    }
    .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
    .item-main{display:flex;gap:10px;min-width:0;flex:1}
    .dot{width:12px;height:12px;border-radius:999px;margin-top:7px;flex:0 0 auto}
    .item-title{font-size:19px;font-weight:900;line-height:1.35;word-break:break-word}
    .item-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
    .tag{
      min-height:28px;padding:0 10px;border-radius:999px;display:inline-flex;align-items:center;
      font-size:12px;font-weight:900
    }
    .t-blue{background:#eef6ff;color:#4a90e2}
    .t-purple{background:#f3efff;color:#7b57d0}
    .t-orange{background:#fff7ea;color:#c98211}
    .t-green{background:#eefaf5;color:#26815d}
    .t-gold{background:#fff8eb;color:#9d6a12}
    .t-gray{background:#f2f5f8;color:#6a7e93}
    .item-meta{font-size:14px;font-weight:700;color:#5e7388;line-height:1.8;white-space:pre-wrap;word-break:break-word}
    .item-actions{display:flex;gap:8px;flex-wrap:wrap}
    .empty{
      border:1px solid #dfeaf5;border-radius:16px;background:#fbfdff;color:#6c8095;
      padding:14px;font-size:14px;font-weight:800
    }
    iframe{display:none;width:0;height:0;border:0}

    @media (max-width:1200px){
      .layout{grid-template-columns:1fr}
    }
    @media (max-width:760px){
      .page{padding:12px}
      .row-2,.row-3{grid-template-columns:1fr}
      .brand-title{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-kicker">Engineering Admin</div>
        <div class="brand-title">後台管理 Admin</div>
      </div>
      <div class="top-actions">
        <a class="btn" href="./index.html">首頁 Home</a>
        <a class="btn" href="./region.html">分布 Region</a>
        <button class="btn btn-gold" type="button" id="btnReloadAll">重新整理 Reload</button>
      </div>
    </div>

    <div class="layout">
      <div class="stack">
        <div class="panel blue">
          <div class="panel-head">
            <div>
              <div class="panel-title">活動 Event</div>
              <div class="panel-sub">活動 / 會議 / 現勘 / 案場</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              <div class="field">
                <label for="password">密碼 Password</label>
                <input id="password" type="password" value="12345678" autocomplete="off">
              </div>

              <input id="eventId" type="hidden">

              <div class="field">
                <label for="eventTitle">標題 Title</label>
                <input id="eventTitle" type="text">
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="eventStart">開始 Start</label>
                  <input id="eventStart" type="datetime-local">
                </div>
                <div class="field">
                  <label for="eventEnd">結束 End</label>
                  <input id="eventEnd" type="datetime-local">
                </div>
              </div>

              <div class="row-3">
                <div class="field">
                  <label for="eventType">類型 Type</label>
                  <select id="eventType">
                    <option value="活動">活動 Event</option>
                    <option value="會議">會議 Meeting</option>
                    <option value="現勘">現勘 Site Survey</option>
                    <option value="案場">案場 Site</option>
                  </select>
                </div>
                <div class="field">
                  <label for="eventRegion">區域 Region</label>
                  <select id="eventRegion">
                    <option value="">自動 Auto</option>
                    <option value="北部">北部 North</option>
                    <option value="中部">中部 Central</option>
                    <option value="南部">南部 South</option>
                    <option value="東部">東部 East</option>
                    <option value="離島">離島 Islands</option>
                    <option value="未分類">未分類 Other</option>
                  </select>
                </div>
                <div class="field">
                  <label for="eventColor">色彩 Color</label>
                  <input id="eventColor" type="color" value="#4a90e2">
                </div>
              </div>

              <div class="field">
                <label for="eventLocation">地點 Location</label>
                <input id="eventLocation" type="text">
              </div>

              <div class="field">
                <label for="eventDescription">內容 Content</label>
                <textarea id="eventDescription"></textarea>
                <div class="hint">網址直接寫入內容，前台自動轉連結</div>
              </div>

              <div class="row-2">
                <div class="field">
                  <label>全天 All Day</label>
                  <div style="display:flex;align-items:center;gap:10px;padding:10px 2px 0">
                    <input id="eventAllDay" type="checkbox" style="width:auto">
                    <span class="hint">全天 All Day</span>
                  </div>
                </div>
              </div>

              <div class="action-row">
                <button class="btn btn-primary" type="button" id="btnSaveEvent">儲存 Save</button>
                <button class="btn btn-red" type="button" id="btnDeleteEvent">刪除 Delete</button>
                <button class="btn" type="button" id="btnResetEvent">清空 Reset</button>
              </div>
            </div>

            <div id="eventStatus" class="status ok">Ready</div>
          </div>
        </div>

        <div class="panel gold">
          <div class="panel-head">
            <div>
              <div class="panel-title">布告欄 Notice</div>
              <div class="panel-sub">照片 Photo / 置頂 Pinned</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              <input id="noticeId" type="hidden">

              <div class="field">
                <label for="noticeTitle">標題 Title</label>
                <input id="noticeTitle" type="text">
              </div>

              <div class="field">
                <label for="noticeMessage">內容 Content</label>
                <textarea id="noticeMessage"></textarea>
              </div>

              <div class="field">
                <label for="noticePhotoUrl">照片 Photo URL</label>
                <input id="noticePhotoUrl" type="text">
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="noticePriority">排序 Priority</label>
                  <input id="noticePriority" type="number" value="50" min="0" step="1">
                </div>
                <div class="field">
                  <label>置頂 Pinned</label>
                  <div style="display:flex;align-items:center;gap:10px;padding:10px 2px 0">
                    <input id="noticePinned" type="checkbox" style="width:auto" checked>
                    <span class="hint">Pinned</span>
                  </div>
                </div>
              </div>

              <div class="action-row">
                <button class="btn btn-primary" type="button" id="btnSaveNotice">儲存 Save</button>
                <button class="btn btn-red" type="button" id="btnDeleteNotice">刪除 Delete</button>
                <button class="btn" type="button" id="btnResetNotice">清空 Reset</button>
              </div>
            </div>

            <div id="noticeStatus" class="status ok">Ready</div>
          </div>
        </div>

        <div class="panel green">
          <div class="panel-head">
            <div>
              <div class="panel-title">人員 Member</div>
              <div class="panel-sub">專案組 / 機動組 / 維運組 / 後勤組 / 設計規劃組</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              <input id="memberId" type="hidden">

              <div class="field">
                <label for="memberName">姓名 Name</label>
                <input id="memberName" type="text">
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="memberGroup">組別 Group</label>
                  <select id="memberGroup">
                    <option value="專案組">專案組 Project</option>
                    <option value="機動組">機動組 Rapid Response</option>
                    <option value="維運組">維運組 O&M</option>
                    <option value="後勤組">後勤組 Support</option>
                    <option value="設計規劃組">設計規劃組 Design</option>
                  </select>
                </div>
                <div class="field">
                  <label for="memberRole">職稱 Role</label>
                  <input id="memberRole" type="text">
                </div>
              </div>

              <div class="row-2">
                <div class="field">
                  <label for="memberPhotoUrl">照片 Photo URL</label>
                  <input id="memberPhotoUrl" type="text">
                </div>
                <div class="field">
                  <label for="memberSortOrder">排序 Sort</label>
                  <input id="memberSortOrder" type="number" value="100" min="0" step="1">
                </div>
              </div>

              <div class="action-row">
                <button class="btn btn-primary" type="button" id="btnSaveMember">儲存 Save</button>
                <button class="btn btn-red" type="button" id="btnDeleteMember">刪除 Delete</button>
                <button class="btn" type="button" id="btnResetMember">清空 Reset</button>
              </div>
            </div>

            <div id="memberStatus" class="status ok">Ready</div>
          </div>
        </div>
      </div>

      <div class="stack">
        <div class="panel blue">
          <div class="panel-head">
            <div>
              <div class="panel-title">活動清單 Event List</div>
              <div class="panel-sub">Edit</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <div class="search"><input id="eventSearch" type="text" placeholder="搜尋 Search"></div>
              <div class="count" id="eventCount">0</div>
            </div>
            <div class="list" id="eventList"><div class="empty">No Data</div></div>
          </div>
        </div>

        <div class="panel gold">
          <div class="panel-head">
            <div>
              <div class="panel-title">公告清單 Notice List</div>
              <div class="panel-sub">Edit</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <div class="search"><input id="noticeSearch" type="text" placeholder="搜尋 Search"></div>
              <div class="count" id="noticeCount">0</div>
            </div>
            <div class="list" id="noticeList"><div class="empty">No Data</div></div>
          </div>
        </div>

        <div class="panel green">
          <div class="panel-head">
            <div>
              <div class="panel-title">人員清單 Member List</div>
              <div class="panel-sub">Edit</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <div class="search"><input id="memberSearch" type="text" placeholder="搜尋 Search"></div>
              <div class="count" id="memberCount">0</div>
            </div>
            <div class="list" id="memberList"><div class="empty">No Data</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <iframe name="hiddenFrame" id="hiddenFrame"></iframe>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxGDD3cvwe_tp3kA3a_EBGcia_Arf0DDEgGn7rsDVGHB8hBGiLPkm4U_-0PXOSUW9yV/exec';

    let allEvents = [];
    let allAnnouncements = [];
    let allMembers = [];

    const GROUP_LABEL = {
      '專案組': 'Project',
      '機動組': 'Rapid Response',
      '維運組': 'O&M',
      '後勤組': 'Support',
      '設計規劃組': 'Design'
    };

    function $(id){ return document.getElementById(id); }

    function safe(v){
      return String(v == null ? '' : v).replace(/[&<>"']/g, s => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]
      ));
    }

    function t(v, d=''){
      const s = String(v == null ? '' : v).trim();
      return s || d;
    }

    function jsonp(url, timeoutMs=12000){
      return new Promise((resolve,reject)=>{
        const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
        let done = false, timer = null, script = null;

        function clean(){
          if(timer) clearTimeout(timer);
          if(script && script.parentNode) script.parentNode.removeChild(script);
          try{ delete window[cb]; }catch(e){ window[cb] = undefined; }
        }

        window[cb] = function(data){
          if(done) return;
          done = true;
          clean();
          resolve(data);
        };

        script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        script.async = true;

        script.onerror = function(){
          if(done) return;
          done = true;
          clean();
          reject(new Error('JSONP Error'));
        };

        timer = setTimeout(function(){
          if(done) return;
          done = true;
          clean();
          reject(new Error('JSONP Timeout'));
        }, timeoutMs);

        document.body.appendChild(script);
      });
    }

    function parseDate(v){
      if(!v) return null;
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }

    function dtLocal(v){
      const d = parseDate(v);
      if(!d) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
    }

    function fmt(v, allDay){
      const d = parseDate(v);
      if(!d) return t(v, '—');
      if(allDay){
        return d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
      }
      return d.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
    }

    function typeColor(type){
      if(type === '會議') return '#8e6dd8';
      if(type === '現勘') return '#f5a623';
      if(type === '案場') return '#2ea97d';
      return '#4a90e2';
    }

    function setStatus(id, kind, text){
      const el = $(id);
      el.className = 'status ' + kind;
      el.textContent = text;
    }

    function createForm(data){
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = API_URL;
      form.target = 'hiddenFrame';
      form.style.display = 'none';

      Object.keys(data).forEach(key=>{
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = data[key] == null ? '' : String(data[key]);
        form.appendChild(input);
      });

      document.body.appendChild(form);
      return form;
    }

    function commonCheck(){
      if(!t(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL') return 'API_URL Error';
      if(!t($('password').value)) return 'Password Required';
      return '';
    }

    function resetEventForm(){
      $('eventId').value = '';
      $('eventTitle').value = '';
      $('eventStart').value = '';
      $('eventEnd').value = '';
      $('eventAllDay').checked = false;
      $('eventType').value = '活動';
      $('eventRegion').value = '';
      $('eventLocation').value = '';
      $('eventDescription').value = '';
      $('eventColor').value = '#4a90e2';
      setStatus('eventStatus','ok','Ready');
    }

    function fillEventForm(e){
      $('eventId').value = t(e.id);
      $('eventTitle').value = t(e.title);
      $('eventStart').value = dtLocal(e.start);
      $('eventEnd').value = dtLocal(e.end);
      $('eventAllDay').checked = !!e.allDay;
      $('eventType').value = t(e.extendedProps?.eventType,'活動');
      $('eventRegion').value = t(e.extendedProps?.region,'');
      $('eventLocation').value = t(e.extendedProps?.location,'');
      $('eventDescription').value = t(e.extendedProps?.description,'');
      $('eventColor').value = t(e.color, typeColor(t(e.extendedProps?.eventType,'活動')));
      setStatus('eventStatus','ok','Edit Mode');
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function saveEvent(){
      const err = commonCheck();
      if(err) return setStatus('eventStatus','warn',err);
      if(!t($('eventTitle').value)) return setStatus('eventStatus','warn','Title Required');
      if(!t($('eventStart').value)) return setStatus('eventStatus','warn','Start Required');

      const data = {
        action: 'upsert_event',
        password: t($('password').value),
        id: t($('eventId').value),
        title: t($('eventTitle').value),
        start: t($('eventStart').value),
        end: t($('eventEnd').value),
        allDay: $('eventAllDay').checked ? 'true' : 'false',
        location: t($('eventLocation').value),
        description: t($('eventDescription').value),
        color: t($('eventColor').value),
        region: t($('eventRegion').value),
        eventType: t($('eventType').value)
      };

      const isUpdate = !!data.id;
      const form = createForm(data);
      setStatus('eventStatus','load','Saving...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadEvents();
          setStatus('eventStatus','ok', isUpdate ? 'Updated' : 'Created');
          if(!isUpdate) resetEventForm();
        }catch(e){
          setStatus('eventStatus','err','Reload Failed');
        }
      },1500);
    }

    function deleteEvent(){
      const err = commonCheck();
      if(err) return setStatus('eventStatus','warn',err);
      const id = t($('eventId').value);
      if(!id) return setStatus('eventStatus','warn','Select Event');
      if(!confirm('Delete Event?')) return;

      const form = createForm({
        action:'delete_event',
        password:t($('password').value),
        id:id
      });
      setStatus('eventStatus','load','Deleting...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadEvents();
          resetEventForm();
          setStatus('eventStatus','ok','Deleted');
        }catch(e){
          setStatus('eventStatus','err','Reload Failed');
        }
      },1500);
    }

    function resetNoticeForm(){
      $('noticeId').value = '';
      $('noticeTitle').value = '';
      $('noticeMessage').value = '';
      $('noticePhotoUrl').value = '';
      $('noticePinned').checked = true;
      $('noticePriority').value = '50';
      setStatus('noticeStatus','ok','Ready');
    }

    function fillNoticeForm(n){
      $('noticeId').value = t(n.id);
      $('noticeTitle').value = t(n.title);
      $('noticeMessage').value = t(n.message);
      $('noticePhotoUrl').value = t(n.photoUrl);
      $('noticePinned').checked = !!n.isPinned;
      $('noticePriority').value = String(Number(n.priority || 0));
      setStatus('noticeStatus','ok','Edit Mode');
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function saveNotice(){
      const err = commonCheck();
      if(err) return setStatus('noticeStatus','warn',err);
      if(!t($('noticeTitle').value)) return setStatus('noticeStatus','warn','Title Required');
      if(!t($('noticeMessage').value)) return setStatus('noticeStatus','warn','Content Required');

      const data = {
        action:'upsert_announcement',
        password:t($('password').value),
        id:t($('noticeId').value),
        title:t($('noticeTitle').value),
        message:t($('noticeMessage').value),
        photoUrl:t($('noticePhotoUrl').value),
        isPinned:$('noticePinned').checked ? 'true' : 'false',
        priority:t($('noticePriority').value,'0')
      };

      const isUpdate = !!data.id;
      const form = createForm(data);
      setStatus('noticeStatus','load','Saving...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadAnnouncements();
          setStatus('noticeStatus','ok', isUpdate ? 'Updated' : 'Created');
          if(!isUpdate) resetNoticeForm();
        }catch(e){
          setStatus('noticeStatus','err','Reload Failed');
        }
      },1500);
    }

    function deleteNotice(){
      const err = commonCheck();
      if(err) return setStatus('noticeStatus','warn',err);
      const id = t($('noticeId').value);
      if(!id) return setStatus('noticeStatus','warn','Select Notice');
      if(!confirm('Delete Notice?')) return;

      const form = createForm({
        action:'delete_announcement',
        password:t($('password').value),
        id:id
      });
      setStatus('noticeStatus','load','Deleting...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadAnnouncements();
          resetNoticeForm();
          setStatus('noticeStatus','ok','Deleted');
        }catch(e){
          setStatus('noticeStatus','err','Reload Failed');
        }
      },1500);
    }

    function resetMemberForm(){
      $('memberId').value = '';
      $('memberName').value = '';
      $('memberGroup').value = '專案組';
      $('memberRole').value = '';
      $('memberPhotoUrl').value = '';
      $('memberSortOrder').value = '100';
      setStatus('memberStatus','ok','Ready');
    }

    function fillMemberForm(m){
      $('memberId').value = t(m.id);
      $('memberName').value = t(m.name);
      $('memberGroup').value = t(m.groupName,'專案組');
      $('memberRole').value = t(m.role);
      $('memberPhotoUrl').value = t(m.photoUrl);
      $('memberSortOrder').value = String(Number(m.sortOrder || 100));
      setStatus('memberStatus','ok','Edit Mode');
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function saveMember(){
      const err = commonCheck();
      if(err) return setStatus('memberStatus','warn',err);
      if(!t($('memberName').value)) return setStatus('memberStatus','warn','Name Required');

      const data = {
        action:'upsert_member',
        password:t($('password').value),
        id:t($('memberId').value),
        name:t($('memberName').value),
        groupName:t($('memberGroup').value),
        role:t($('memberRole').value),
        photoUrl:t($('memberPhotoUrl').value),
        sortOrder:t($('memberSortOrder').value,'100')
      };

      const isUpdate = !!data.id;
      const form = createForm(data);
      setStatus('memberStatus','load','Saving...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadMembers();
          setStatus('memberStatus','ok', isUpdate ? 'Updated' : 'Created');
          if(!isUpdate) resetMemberForm();
        }catch(e){
          setStatus('memberStatus','err','Reload Failed');
        }
      },1500);
    }

    function deleteMember(){
      const err = commonCheck();
      if(err) return setStatus('memberStatus','warn',err);
      const id = t($('memberId').value);
      if(!id) return setStatus('memberStatus','warn','Select Member');
      if(!confirm('Delete Member?')) return;

      const form = createForm({
        action:'delete_member',
        password:t($('password').value),
        id:id
      });
      setStatus('memberStatus','load','Deleting...');
      form.submit();
      setTimeout(()=>{ if(form.parentNode) form.parentNode.removeChild(form); },1200);
      setTimeout(async ()=>{
        try{
          await loadMembers();
          resetMemberForm();
          setStatus('memberStatus','ok','Deleted');
        }catch(e){
          setStatus('memberStatus','err','Reload Failed');
        }
      },1500);
    }

    function renderEventList(data){
      const keyword = t($('eventSearch').value).toLowerCase();
      const items = data.filter(e=>{
        if(!keyword) return true;
        const text = [
          t(e.title), t(e.extendedProps?.location), t(e.extendedProps?.region),
          t(e.extendedProps?.description), t(e.extendedProps?.eventType)
        ].join(' ').toLowerCase();
        return text.includes(keyword);
      });

      $('eventCount').textContent = String(items.length);
      $('eventList').innerHTML = items.length ? items.map(e=>{
        const type = t(e.extendedProps?.eventType,'活動');
        const color = t(e.color, typeColor(type));
        const region = t(e.extendedProps?.region,'未分類');
        const typeClass = type === '會議' ? 't-purple' : (type === '現勘' ? 't-orange' : (type === '案場' ? 't-green' : 't-blue'));

        return `
          <div class="item">
            <div class="item-top">
              <div class="item-main">
                <div class="dot" style="background:${safe(color)}"></div>
                <div>
                  <div class="item-title">${safe(t(e.title))}</div>
                  <div class="item-tags">
                    <span class="tag t-gray">${safe(region)}</span>
                    <span class="tag ${typeClass}">${safe(type)}</span>
                    <span class="tag t-gray">${e.allDay ? 'All Day' : 'Timed'}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="item-meta">${safe(fmt(e.start,e.allDay))}${e.end ? ' → ' + safe(fmt(e.end,e.allDay)) : ''}
${safe(t(e.extendedProps?.location))}
${safe(t(e.extendedProps?.description))}</div>
            <div class="item-actions">
              <button class="btn btn-primary" type="button" data-event="${safe(t(e.id))}">Edit</button>
            </div>
          </div>
        `;
      }).join('') : '<div class="empty">No Data</div>';

      document.querySelectorAll('[data-event]').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const item = allEvents.find(x=>String(x.id)===String(btn.getAttribute('data-event')));
          if(item) fillEventForm(item);
        });
      });
    }

    function renderNoticeList(data){
      const keyword = t($('noticeSearch').value).toLowerCase();
      const items = data.filter(n=>{
        if(!keyword) return true;
        const text = [t(n.title), t(n.message), t(n.photoUrl)].join(' ').toLowerCase();
        return text.includes(keyword);
      });

      $('noticeCount').textContent = String(items.length);
      $('noticeList').innerHTML = items.length ? items.map(n=>`
        <div class="item">
          <div class="item-top">
            <div class="item-main">
              <div class="dot" style="background:#d9a441"></div>
              <div>
                <div class="item-title">${safe(t(n.title))}</div>
                <div class="item-tags">
                  <span class="tag ${n.isPinned ? 't-orange' : 't-gray'}">${n.isPinned ? 'Pinned' : 'Normal'}</span>
                  <span class="tag t-gold">P ${safe(String(n.priority))}</span>
                  <span class="tag ${t(n.photoUrl) ? 't-blue' : 't-gray'}">${t(n.photoUrl) ? 'Photo' : 'No Photo'}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="item-meta">${safe(t(n.message))}
${safe(t(n.photoUrl))}
${safe(t(n.updateAt))}</div>
          <div class="item-actions">
            <button class="btn btn-primary" type="button" data-notice="${safe(t(n.id))}">Edit</button>
          </div>
        </div>
      `).join('') : '<div class="empty">No Data</div>';

      document.querySelectorAll('[data-notice]').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const item = allAnnouncements.find(x=>String(x.id)===String(btn.getAttribute('data-notice')));
          if(item) fillNoticeForm(item);
        });
      });
    }

    function renderMemberList(data){
      const keyword = t($('memberSearch').value).toLowerCase();
      const items = data.filter(m=>{
        if(!keyword) return true;
        const text = [t(m.name), t(m.groupName), t(m.role)].join(' ').toLowerCase();
        return text.includes(keyword);
      });

      $('memberCount').textContent = String(items.length);
      $('memberList').innerHTML = items.length ? items.map(m=>`
        <div class="item">
          <div class="item-top">
            <div class="item-main">
              <div class="dot" style="background:#2ea97d"></div>
              <div>
                <div class="item-title">${safe(t(m.name))}</div>
                <div class="item-tags">
                  <span class="tag t-green">${safe(t(m.groupName))}</span>
                  <span class="tag t-gray">${safe(GROUP_LABEL[t(m.groupName)] || '')}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="item-meta">${safe(t(m.role))}
${safe(t(m.photoUrl))}
Sort ${safe(String(m.sortOrder))}</div>
          <div class="item-actions">
            <button class="btn btn-primary" type="button" data-member="${safe(t(m.id))}">Edit</button>
          </div>
        </div>
      `).join('') : '<div class="empty">No Data</div>';

      document.querySelectorAll('[data-member]').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const item = allMembers.find(x=>String(x.id)===String(btn.getAttribute('data-member')));
          if(item) fillMemberForm(item);
        });
      });
    }

    async function loadEvents(){
      setStatus('eventStatus','load','Loading...');
      const data = await jsonp(API_URL + '?action=list_events');
      if(!data || !data.ok) throw new Error('Event API');
      allEvents = Array.isArray(data.events) ? data.events : [];
      renderEventList(allEvents);
      setStatus('eventStatus','ok','Loaded');
    }

    async function loadAnnouncements(){
      setStatus('noticeStatus','load','Loading...');
      const data = await jsonp(API_URL + '?action=list_announcements');
      if(!data || !data.ok) throw new Error('Notice API');
      allAnnouncements = Array.isArray(data.announcements) ? data.announcements : [];
      renderNoticeList(allAnnouncements);
      setStatus('noticeStatus','ok','Loaded');
    }

    async function loadMembers(){
      setStatus('memberStatus','load','Loading...');
      const data = await jsonp(API_URL + '?action=list_members');
      if(!data || !data.ok) throw new Error('Member API');
      allMembers = Array.isArray(data.members) ? data.members : [];
      renderMemberList(allMembers);
      setStatus('memberStatus','ok','Loaded');
    }

    async function reloadAll(){
      await Promise.all([loadEvents(), loadAnnouncements(), loadMembers()]);
    }

    function bind(){
      $('btnSaveEvent').addEventListener('click', saveEvent);
      $('btnDeleteEvent').addEventListener('click', deleteEvent);
      $('btnResetEvent').addEventListener('click', resetEventForm);

      $('btnSaveNotice').addEventListener('click', saveNotice);
      $('btnDeleteNotice').addEventListener('click', deleteNotice);
      $('btnResetNotice').addEventListener('click', resetNoticeForm);

      $('btnSaveMember').addEventListener('click', saveMember);
      $('btnDeleteMember').addEventListener('click', deleteMember);
      $('btnResetMember').addEventListener('click', resetMemberForm);

      $('btnReloadAll').addEventListener('click', ()=>{
        reloadAll().catch(err=>{
          setStatus('eventStatus','err', err.message || 'Reload Error');
          setStatus('noticeStatus','err', err.message || 'Reload Error');
          setStatus('memberStatus','err', err.message || 'Reload Error');
        });
      });

      $('eventSearch').addEventListener('input', ()=>renderEventList(allEvents));
      $('noticeSearch').addEventListener('input', ()=>renderNoticeList(allAnnouncements));
      $('memberSearch').addEventListener('input', ()=>renderMemberList(allMembers));

      $('eventType').addEventListener('change', ()=>{
        $('eventColor').value = typeColor(t($('eventType').value,'活動'));
      });

      $('eventAllDay').addEventListener('change', ()=>{
        if($('eventAllDay').checked && $('eventStart').value && !$('eventEnd').value){
          $('eventEnd').value = $('eventStart').value;
        }
      });
    }

    async function boot(){
      try{
        if(!t(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL') throw new Error('API_URL Error');
        bind();
        resetEventForm();
        resetNoticeForm();
        resetMemberForm();
        await reloadAll();
      }catch(err){
        setStatus('eventStatus','err', err.message || 'Init Error');
        setStatus('noticeStatus','err', err.message || 'Init Error');
        setStatus('memberStatus','err', err.message || 'Init Error');
        $('eventList').innerHTML = '<div class="empty">Event API Error</div>';
        $('noticeList').innerHTML = '<div class="empty">Notice API Error</div>';
        $('memberList').innerHTML = '<div class="empty">Member API Error</div>';
      }
    }

    boot();
  </script>
</body>
</html>
