<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events 活動</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC";
background:#f4f8fc;
color:#1f3042
}

.top{
background:#fff;
padding:16px;
border-bottom:1px solid #d8e5f2;
display:flex;
justify-content:space-between;
align-items:center
}

.logo{
font-size:22px;
font-weight:900
}

.nav a{
margin-left:12px;
text-decoration:none;
font-weight:700;
color:#4a90e2
}

.stats{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
padding:16px
}

.stat{
background:#fff;
padding:14px;
border-radius:14px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,.06)
}

.stat-title{
font-size:12px;
color:#63788f
}

.stat-num{
font-size:22px;
font-weight:900
}

.list{
padding:16px;
display:grid;
gap:12px
}

.card{
background:#fff;
border-radius:16px;
padding:16px;
box-shadow:0 6px 18px rgba(0,0,0,.06)
}

.title{
font-size:18px;
font-weight:900
}

.tag{
display:inline-block;
padding:3px 10px;
border-radius:999px;
font-size:12px;
margin-right:6px;
margin-top:6px
}

.t-blue{background:#eef6ff;color:#4a90e2}
.t-purple{background:#f3efff;color:#7b57d0}
.t-orange{background:#fff7ea;color:#c98211}
.t-green{background:#eefaf5;color:#26815d}
.t-teal{background:#eefaf2;color:#15803d}

.meta{
font-size:14px;
margin-top:8px;
white-space:pre-wrap;
color:#5e7388
}

a{
color:#4a90e2;
text-decoration:underline
}

.search{
padding:16px
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d8e5f2
}

.empty{
padding:20px;
text-align:center;
color:#6c8095
}

@media(max-width:800px){

.stats{
grid-template-columns:1fr 1fr
}

}

</style>

</head>

<body>

<div class="top">

<div class="logo">
Events 活動
</div>

<div class="nav">

<a href="./index.html">Home</a>
<a href="./calendar.html">Calendar</a>
<a href="./sites.html">Sites</a>
<a href="./members.html">Members</a>

</div>

</div>

<div class="stats">

<div class="stat">
<div class="stat-title">全部</div>
<div class="stat-num" id="countAll">0</div>
</div>

<div class="stat">
<div class="stat-title">活動</div>
<div class="stat-num" id="countEvent">0</div>
</div>

<div class="stat">
<div class="stat-title">會議</div>
<div class="stat-num" id="countMeeting">0</div>
</div>

<div class="stat">
<div class="stat-title">現勘</div>
<div class="stat-num" id="countSurvey">0</div>
</div>

<div class="stat">
<div class="stat-title">案場</div>
<div class="stat-num" id="countSite">0</div>
</div>

<div class="stat">
<div class="stat-title">維運</div>
<div class="stat-num" id="countOM">0</div>
</div>

</div>

<div class="search">
<input id="searchBox" placeholder="搜尋活動 / 地點 / 說明">
</div>

<div class="list" id="eventList"></div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbxGDD3cvwe_tp3kA3a_EBGcia_Arf0DDEgGn7rsDVGHB8hBGiLPkm4U_-0PXOSUW9yV/exec"

function $(id){return document.getElementById(id)}

function t(v){return String(v||'').trim()}

function parseDate(v){
const d=new Date(v)
return isNaN(d.getTime())?null:d
}

function fmt(v){
const d=parseDate(v)
if(!d)return v
return d.toLocaleString("zh-TW",{hour12:false})
}

function linkify(text){
return text.replace(/https?:\/\/[^\s]+/g,function(url){
return '<a href="'+url+'" target="_blank">'+url+'</a>'
})
}

function typeClass(type){

if(type==="會議")return"t-purple"
if(type==="現勘")return"t-orange"
if(type==="案場")return"t-green"
if(type==="維運")return"t-teal"

return"t-blue"

}

let allEvents=[]

async function load(){

const res=await fetch(API_URL+"?action=list_events")
const json=await res.json()

if(!json.ok)return

allEvents=json.events||[]

renderStats(allEvents)
renderList(allEvents)

}

function renderStats(events){

$('countAll').textContent=events.length

$('countEvent').textContent=
events.filter(e=>t(e.extendedProps?.eventType)==="活動").length

$('countMeeting').textContent=
events.filter(e=>t(e.extendedProps?.eventType)==="會議").length

$('countSurvey').textContent=
events.filter(e=>t(e.extendedProps?.eventType)==="現勘").length

$('countSite').textContent=
events.filter(e=>t(e.extendedProps?.eventType)==="案場").length

$('countOM').textContent=
events.filter(e=>t(e.extendedProps?.eventType)==="維運").length

}

function renderList(events){

const keyword=t($('searchBox').value).toLowerCase()

const rows=events.filter(e=>{

if(!keyword)return true

const text=[
t(e.title),
t(e.extendedProps?.location),
t(e.extendedProps?.description),
t(e.extendedProps?.region),
t(e.extendedProps?.eventType)
].join(" ").toLowerCase()

return text.includes(keyword)

})

if(!rows.length){
$('eventList').innerHTML='<div class="empty">No Event</div>'
return
}

$('eventList').innerHTML=rows.map(e=>{

const type=t(e.extendedProps?.eventType)||"活動"
const region=t(e.extendedProps?.region)||"未分類"

const start=fmt(e.start)
const end=e.end?fmt(e.end):""

const desc=linkify(t(e.extendedProps?.description))

return`

<div class="card">

<div class="title">

<span class="tag ${typeClass(type)}">${type}</span>

${e.title}

</div>

<div class="meta">

${start}${end?" → "+end:""}

${t(e.extendedProps?.location)}

${region}

${desc}

</div>

</div>

`

}).join("")

}

$('searchBox').addEventListener("input",()=>renderList(allEvents))

load()

</script>

</body>
</html>
