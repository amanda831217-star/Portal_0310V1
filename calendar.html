<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Calendar 月曆</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC";
background:#f4f8fc;
color:#1f3042
}

.top{
background:#fff;
padding:16px;
border-bottom:1px solid #d8e5f2;
display:flex;
justify-content:space-between;
align-items:center
}

.logo{
font-size:22px;
font-weight:900
}

.nav a{
margin-left:12px;
text-decoration:none;
font-weight:700;
color:#4a90e2
}

.wrap{
display:grid;
grid-template-columns:1fr 340px;
gap:16px;
padding:16px
}

#calendar{
background:#fff;
border-radius:16px;
padding:10px;
box-shadow:0 6px 18px rgba(0,0,0,.06)
}

.detail{
background:#fff;
border-radius:16px;
padding:16px;
box-shadow:0 6px 18px rgba(0,0,0,.06)
}

.detail-title{
font-size:20px;
font-weight:900;
margin-bottom:8px
}

.tag{
display:inline-block;
padding:3px 10px;
border-radius:999px;
font-size:12px;
margin-right:6px
}

.t-blue{background:#eef6ff;color:#4a90e2}
.t-purple{background:#f3efff;color:#7b57d0}
.t-orange{background:#fff7ea;color:#c98211}
.t-green{background:#eefaf5;color:#26815d}
.t-teal{background:#eefaf2;color:#15803d}

.meta{
margin-top:10px;
font-size:14px;
white-space:pre-wrap;
color:#5e7388
}

a{
color:#4a90e2;
text-decoration:underline
}

.detail-empty{
color:#6c8095;
padding:20px;
text-align:center
}

@media(max-width:900px){

.wrap{
grid-template-columns:1fr
}

}

</style>

</head>

<body>

<div class="top">

<div class="logo">Calendar 月曆</div>

<div class="nav">

<a href="./index.html">Home</a>
<a href="./events.html">Events</a>
<a href="./sites.html">Sites</a>
<a href="./members.html">Members</a>

</div>

</div>

<div class="wrap">

<div id="calendar"></div>

<div class="detail" id="detailBox">
<div class="detail-empty">Select Event</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxGDD3cvwe_tp3kA3a_EBGcia_Arf0DDEgGn7rsDVGHB8hBGiLPkm4U_-0PXOSUW9yV/exec"

function $(id){return document.getElementById(id)}

function t(v){return String(v||'').trim()}

function parseDate(v){
const d=new Date(v)
return isNaN(d.getTime())?null:d
}

function fmt(v){
const d=parseDate(v)
if(!d)return v
return d.toLocaleString("zh-TW",{hour12:false})
}

function linkify(text){
return text.replace(/https?:\/\/[^\s]+/g,function(url){
return '<a href="'+url+'" target="_blank">'+url+'</a>'
})
}

function typeClass(type){

if(type==="會議")return"t-purple"
if(type==="現勘")return"t-orange"
if(type==="案場")return"t-green"
if(type==="維運")return"t-teal"

return"t-blue"

}

function queryFocus(){
const url=new URL(location.href)
return url.searchParams.get("focus")
}

function renderDetail(e){

const type=t(e.extendedProps?.eventType)||"活動"
const region=t(e.extendedProps?.region)||"未分類"

const start=fmt(e.start)
const end=e.end?fmt(e.end):""

const desc=linkify(t(e.extendedProps?.description))

$('detailBox').innerHTML=`

<div class="detail-title">${e.title}</div>

<div>
<span class="tag ${typeClass(type)}">${type}</span>
<span class="tag t-blue">${region}</span>
</div>

<div class="meta">

${start}${end?" → "+end:""}

${t(e.extendedProps?.location)}

${desc}

</div>

`

}

async function load(){

const res=await fetch(API_URL+"?action=list_events")
const json=await res.json()

if(!json.ok)return

initCalendar(json.events||[])

}

let calendar

function initCalendar(events){

calendar=new FullCalendar.Calendar($('calendar'),{

locale:'zh-tw',

initialView:'dayGridMonth',

height:'auto',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,listMonth'
},

buttonText:{
today:'今天',
month:'月',
week:'週',
list:'列表'
},

dayMaxEvents:3,

navLinks:true,

events:events,

eventClick:function(info){
info.jsEvent.preventDefault()
renderDetail(info.event)
},

dateClick:function(info){

const found=calendar.getEvents().filter(e=>{
const d=parseDate(e.start)
return d &&
d.getFullYear()==info.date.getFullYear() &&
d.getMonth()==info.date.getMonth() &&
d.getDate()==info.date.getDate()
})

if(found.length)renderDetail(found[0])
else $('detailBox').innerHTML='<div class="detail-empty">No Event</div>'

}

})

calendar.render()

const focusId=queryFocus()

if(focusId){

const target=calendar.getEventById(focusId)

if(target){
if(target.start)calendar.gotoDate(target.start)
renderDetail(target)
return
}

}

const all=calendar.getEvents()

if(all.length){

const first=all
.filter(e=>e.start)
.sort((a,b)=>new Date(a.start)-new Date(b.start))[0]

if(first && first.start){
calendar.gotoDate(first.start)
renderDetail(first)
}

}

}

load()

</script>

</body>
</html>
