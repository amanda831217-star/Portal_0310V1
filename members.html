<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members 人員</title>
  <style>
    :root{
      --bg:#f4f8fc;
      --panel:#ffffff;
      --line:#d8e5f2;
      --text:#1f3042;
      --muted:#63788f;

      --blue:#4a90e2;
      --blue-soft:#eef6ff;

      --green:#2ea97d;
      --green-soft:#eefaf5;

      --purple:#8e6dd8;
      --purple-soft:#f3efff;

      --gold:#d9a441;
      --gold-soft:#fff8eb;

      --shadow:0 10px 24px rgba(58,100,160,.08);
      --r:22px;
      --navh:78px;
      --maxw:1180px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top left, rgba(124,183,255,.18), transparent 26%),
        linear-gradient(180deg,#f8fbff 0%,#eef5fc 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      min-height:100vh;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    .page{
      max-width:var(--maxw);
      margin:0 auto;
      padding:16px 16px calc(var(--navh) + 18px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .brand{display:flex;flex-direction:column;gap:4px}
    .brand-kicker{
      font-size:11px;
      font-weight:800;
      letter-spacing:2px;
      color:var(--green);
      text-transform:uppercase;
    }
    .brand-title{
      font-size:26px;
      font-weight:900;
      line-height:1.15;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      appearance:none;
      border:1px solid #bfd4ee;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:11px 16px;
      min-height:44px;
      font-size:14px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(74,144,226,.05);
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-blue{
      background:linear-gradient(180deg,#7bbcff,#4a90e2);
      color:#fff;
      border-color:#5ca2ef;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .stack{display:grid;gap:16px}

    .panel{
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:15px 16px;
      border-bottom:1px solid #e9f1f8;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .panel-title{font-size:20px;font-weight:900}
    .panel-sub{font-size:12px;font-weight:800;color:var(--muted);margin-top:4px}
    .panel-body{padding:16px}

    .theme-green .panel-head{background:linear-gradient(180deg,#f4fff9,#eefaf5)}
    .theme-blue .panel-head{background:linear-gradient(180deg,#f5faff,#eef6ff)}

    .search{
      width:100%;
      border:1px solid #d9e5f2;
      border-radius:14px;
      background:#fff;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      color:var(--text);
      margin-bottom:12px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .stat-card{
      border:1px solid #dfeaf5;
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#f9fbff);
      padding:12px;
    }

    .stat-k{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:6px;
    }

    .stat-v{
      font-size:24px;
      font-weight:900;
      line-height:1;
    }

    .rank-list{
      display:grid;
      gap:10px;
    }

    .rank-row{
      display:grid;
      grid-template-columns:46px 1fr auto;
      gap:10px;
      align-items:center;
      padding:12px;
      border:1px solid #e6eef7;
      border-radius:14px;
      background:#fff;
    }

    .medal{
      width:38px;
      height:38px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:900;
    }

    .m1{background:#fff7dc;color:#b07b08}
    .m2{background:#f1f5f9;color:#67798d}
    .m3{background:#fff0e6;color:#b86a2c}
    .m0{background:#eef6ff;color:#4a90e2}

    .rank-name{font-size:15px;font-weight:900}
    .rank-sub{font-size:12px;color:var(--muted);font-weight:800;margin-top:2px}
    .rank-num{font-size:18px;font-weight:900}

    .member-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .member-card{
      border:1px solid #dfeaf5;
      border-radius:18px;
      background:linear-gradient(180deg,#fff,#f9fbff);
      overflow:hidden;
    }

    .member-photo{
      aspect-ratio:1/1;
      background:#eef5fc;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .member-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .member-fallback{
      font-size:30px;
      font-weight:900;
      color:#87a0b8;
    }

    .member-info{
      padding:12px;
    }

    .member-name{
      font-size:17px;
      font-weight:900;
      line-height:1.3;
    }

    .member-role{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
      margin-top:4px;
    }

    .tag-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .tag{
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      font-size:12px;
      font-weight:900;
    }

    .t-green{background:#eefaf5;color:#26815d}
    .t-blue{background:#eef6ff;color:#4a90e2}
    .t-gray{background:#f2f5f8;color:#6a7e93}

    .empty{
      border:1px solid #dfeaf5;
      border-radius:16px;
      background:#fbfdff;
      color:#6c8095;
      padding:14px;
      font-size:14px;
      font-weight:800;
    }

    .err{
      border:1px solid #f0ccd2;
      border-radius:16px;
      background:#fff3f4;
      color:#bb4252;
      padding:14px;
      font-size:14px;
      font-weight:800;
      line-height:1.8;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:1000;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(10px);
      border-top:1px solid #dfe8f2;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      box-shadow:0 -8px 20px rgba(58,100,160,.08);
      height:var(--navh);
    }

    .nav-item{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:900;
      color:#6b8198;
    }

    .nav-item.active{color:var(--green)}
    .nav-ico{font-size:18px;line-height:1}

    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
    }

    @media (max-width:900px){
      .stats-grid{grid-template-columns:1fr 1fr}
    }

    @media (max-width:760px){
      .page{
        padding:12px 12px calc(var(--navh) + 18px);
      }

      .brand-title{
        font-size:23px;
      }

      .member-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-kicker">Member Overview</div>
        <div class="brand-title">人員 Member</div>
      </div>

      <div class="top-actions">
        <a class="btn" href="./index.html">Home</a>
        <a class="btn btn-blue" href="./admin.html">Admin</a>
      </div>
    </div>

    <div class="layout">
      <div class="stack">
        <section class="panel theme-green">
          <div class="panel-head">
            <div>
              <div class="panel-title">人員統計 Summary</div>
              <div class="panel-sub">Project / Rapid / O&M / Support / Design</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-k">總人數 Total</div>
                <div class="stat-v" id="statTotal">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-k">專案組 Project</div>
                <div class="stat-v" id="statProject">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-k">機動組 Rapid</div>
                <div class="stat-v" id="statRapid">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-k">維運組 O&M</div>
                <div class="stat-v" id="statOM">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-k">後勤組 Support</div>
                <div class="stat-v" id="statSupport">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-k">設計規劃組 Design</div>
                <div class="stat-v" id="statDesign">0</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel theme-green">
          <div class="panel-head">
            <div>
              <div class="panel-title">人員名冊 Roster</div>
              <div class="panel-sub">Photo / Group / Role</div>
            </div>
          </div>
          <div class="panel-body">
            <input id="searchInput" class="search" type="text" placeholder="搜尋 Search">
            <div class="member-grid" id="memberGrid">
              <div class="empty">Loading...</div>
            </div>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel theme-blue">
          <div class="panel-head">
            <div>
              <div class="panel-title">組別人數</div>
              <div class="panel-sub">1st / 2nd / 3rd</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="rank-list" id="groupRank">
              <div class="empty">Loading...</div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div id="errorBox" style="margin-top:16px;"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="./index.html">
      <div class="nav-ico">📢</div>
      <div>公告</div>
    </a>
    <a class="nav-item" href="./events.html">
      <div class="nav-ico">📋</div>
      <div>活動</div>
    </a>
    <a class="nav-item" href="./calendar.html">
      <div class="nav-ico">🗓️</div>
      <div>月曆</div>
    </a>
    <a class="nav-item" href="./sites.html">
      <div class="nav-ico">📍</div>
      <div>案場</div>
    </a>
    <a class="nav-item active" href="./members.html">
      <div class="nav-ico">👥</div>
      <div>人員</div>
    </a>
  </nav>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxGDD3cvwe_tp3kA3a_EBGcia_Arf0DDEgGn7rsDVGHB8hBGiLPkm4U_-0PXOSUW9yV/exec';

    let allMembers = [];

    const GROUP_LABEL = {
      '專案組': 'Project',
      '機動組': 'Rapid Response',
      '維運組': 'O&M',
      '後勤組': 'Support',
      '設計規劃組': 'Design'
    };

    function $(id){ return document.getElementById(id); }

    function safe(v){
      return String(v == null ? '' : v).replace(/[&<>"']/g, s => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]
      ));
    }

    function t(v,d=''){
      const s = String(v == null ? '' : v).trim();
      return s || d;
    }

    function jsonp(url, timeoutMs=12000){
      return new Promise((resolve,reject)=>{
        const cb = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
        let done = false, timer = null, script = null;

        function clean(){
          if(timer) clearTimeout(timer);
          if(script && script.parentNode) script.parentNode.removeChild(script);
          try{ delete window[cb]; }catch(e){ window[cb] = undefined; }
        }

        window[cb] = function(data){
          if(done) return;
          done = true;
          clean();
          resolve(data);
        };

        script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        script.async = true;

        script.onerror = function(){
          if(done) return;
          done = true;
          clean();
          reject(new Error('JSONP Error'));
        };

        timer = setTimeout(function(){
          if(done) return;
          done = true;
          clean();
          reject(new Error('JSONP Timeout'));
        }, timeoutMs);

        document.body.appendChild(script);
      });
    }

    function normalizeMembers(raw){
      if(!Array.isArray(raw)) return [];
      return raw.map(m=>({
        id:t(m.id),
        name:t(m.name),
        groupName:t(m.groupName,'專案組'),
        role:t(m.role),
        photoUrl:t(m.photoUrl),
        sortOrder:Number(m.sortOrder || 9999),
        updateAt:t(m.updateAt)
      }));
    }

    function rankBadge(i){
      if(i===0) return ['🥇','m1'];
      if(i===1) return ['🥈','m2'];
      if(i===2) return ['🥉','m3'];
      return [String(i+1),'m0'];
    }

    function groupMap(){
      const map = {
        '專案組': 0,
        '機動組': 0,
        '維運組': 0,
        '後勤組': 0,
        '設計規劃組': 0
      };
      allMembers.forEach(m=>{
        const g = t(m.groupName,'專案組');
        map[g] = (map[g] || 0) + 1;
      });
      return map;
    }

    function renderStats(){
      const map = groupMap();
      $('statTotal').textContent = String(allMembers.length);
      $('statProject').textContent = String(map['專案組'] || 0);
      $('statRapid').textContent = String(map['機動組'] || 0);
      $('statOM').textContent = String(map['維運組'] || 0);
      $('statSupport').textContent = String(map['後勤組'] || 0);
      $('statDesign').textContent = String(map['設計規劃組'] || 0);
    }

    function renderRank(){
      const map = groupMap();
      const rows = Object.keys(map).map(name=>({
        name:name,
        sub:GROUP_LABEL[name] || '',
        count:map[name]
      })).sort((a,b)=>b.count-a.count);

      $('groupRank').innerHTML = rows.length ? rows.map((row,i)=>{
        const [medal, cls] = rankBadge(i);
        return `
          <div class="rank-row">
            <div class="medal ${cls}">${medal}</div>
            <div>
              <div class="rank-name">${safe(t(row.name))}</div>
              <div class="rank-sub">${safe(t(row.sub))}</div>
            </div>
            <div class="rank-num">${safe(String(row.count))}</div>
          </div>
        `;
      }).join('') : '<div class="empty">No Data</div>';
    }

    function renderMembers(){
      const keyword = t($('searchInput').value).toLowerCase();
      const rows = allMembers.filter(m=>{
        if(!keyword) return true;
        const text = [t(m.name), t(m.groupName), t(m.role)].join(' ').toLowerCase();
        return text.includes(keyword);
      });

      $('memberGrid').innerHTML = rows.length ? rows.map(m=>`
        <div class="member-card">
          <div class="member-photo">
            ${
              t(m.photoUrl)
              ? `<img src="${safe(t(m.photoUrl))}" alt="${safe(t(m.name))}" onerror="this.outerHTML='<div class=&quot;member-fallback&quot;>👤</div>'">`
              : `<div class="member-fallback">👤</div>`
            }
          </div>
          <div class="member-info">
            <div class="member-name">${safe(t(m.name))}</div>
            <div class="member-role">${safe(t(m.role,'—'))}</div>
            <div class="tag-row">
              <span class="tag t-green">${safe(t(m.groupName))}</span>
              <span class="tag t-blue">${safe(GROUP_LABEL[t(m.groupName)] || '')}</span>
            </div>
          </div>
        </div>
      `).join('') : '<div class="empty">No Data</div>';
    }

    async function boot(){
      try{
        if(!t(API_URL) || API_URL === 'YOUR_GAS_WEBAPP_URL'){
          throw new Error('API_URL Error');
        }

        const data = await jsonp(API_URL + '?action=list_members');
        if(!data || !data.ok) throw new Error('Member API Error');

        allMembers = normalizeMembers(data.members || []);
        renderStats();
        renderRank();
        renderMembers();

        $('searchInput').addEventListener('input', renderMembers);
      }catch(err){
        $('errorBox').innerHTML = `<div class="err">${safe(err.message || 'Init Error')}</div>`;
        $('groupRank').innerHTML = '<div class="err">Rank Error</div>';
        $('memberGrid').innerHTML = '<div class="err">Member Error</div>';
      }
    }

    boot();
  </script>
</body>
</html>
